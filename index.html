<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trainingslog</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Barlow+Condensed:wght@700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f0f0f;color:#e8e6e0;font-family:'DM Mono','Courier New',monospace;min-height:100vh;padding-bottom:80px}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
  input[type=number]{-moz-appearance:textfield}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#1a1a1a}::-webkit-scrollbar-thumb{background:#333}
  .header{padding:20px 16px 0;border-bottom:1px solid #1e1e1e}
  .header-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
  .header-left{display:flex;align-items:baseline;gap:12px}
  .logo{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:.04em}
  .subtitle{font-size:11px;color:#444;letter-spacing:.1em}
  .sync-dot{font-size:10px;letter-spacing:.08em}
  .tabs{display:flex;gap:0;margin-top:10px;overflow-x:auto}
  .tab{background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:10px 14px;color:#555;white-space:nowrap;transition:color .15s}
  .tab.active{color:#e8e6e0}
  .content{padding:20px 16px;max-width:640px;margin:0 auto}
  .dag-pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px}
  .dag-pill{border:1px solid #2a2a2a;background:none;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;border-radius:2px;color:#555;white-space:nowrap;transition:all .15s}
  .dag-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;font-weight:500}
  .reps-hint{font-size:11px;color:#555;margin-bottom:18px;padding:8px 12px;background:#141414;border-radius:2px;line-height:1.7}
  .reps-hint span{color:#888}
  .date-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .date-label{font-size:11px;color:#555;letter-spacing:.1em;text-transform:uppercase}
  .date-input{background:#1c1c1c;border:1px solid #2a2a2a;color:#e8e6e0;font-family:inherit;font-size:12px;padding:5px 10px;border-radius:2px}
  .exercise{margin-bottom:22px;border-bottom:1px solid #1a1a1a;padding-bottom:20px}
  .exercise-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .exercise-name{font-size:13px;font-weight:500;letter-spacing:.04em}
  .exercise-meta{display:flex;align-items:center;gap:10px}
  .exercise-reps{font-size:13px;color:#888;letter-spacing:.04em}
  .btn-small{background:none;border:1px solid #2a2a2a;color:#666;font-family:inherit;font-size:10px;letter-spacing:.08em;padding:3px 8px;border-radius:2px;cursor:pointer;white-space:nowrap}
  .btn-small.danger{color:#663333}
  .sets-row{display:flex;gap:8px;flex-wrap:wrap}
  .set-col{display:flex;flex-direction:column;align-items:center;gap:4px}
  .set-label{font-size:9px;color:#383838;letter-spacing:.08em}
  .set-inputs{display:flex;gap:4px}
  .set-input-wrap{display:flex;flex-direction:column;align-items:center}
  .si{background:#1c1c1c;border:1px solid #2a2a2a;color:#e8e6e0;font-family:inherit;font-size:13px;width:58px;padding:5px 8px;text-align:center;border-radius:2px;transition:border-color .15s}
  .si:focus{outline:none;border-color:#555}
  .si.filled{border-color:#3a3a3a;background:#152020}
  .prev-val{font-size:10px;color:#383838;margin-top:2px;text-align:center}
  .btn-save{border:none;cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:12px 24px;border-radius:2px;width:100%;font-weight:600;transition:all .15s}
  .btn-clear-day{background:none;border:1px solid #2a2a2a;color:#663333;font-family:inherit;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:10px;border-radius:2px;width:100%;margin-top:8px;cursor:pointer}
  .schema-day{margin-bottom:24px;border-left:3px solid;padding-left:16px}
  .schema-day-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.06em;margin-bottom:8px}
  .schema-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid #161616}
  .schema-row span:first-child{color:#ccc}
  .schema-row span:last-child{color:#555}
  .guidelines{margin-top:24px;padding:16px;background:#141414;border-radius:2px;font-size:11px;color:#555;line-height:1.9}
  .guidelines-title{color:#777;margin-bottom:8px;letter-spacing:.1em;text-transform:uppercase}
  .guidelines-section{margin-top:12px;padding-top:12px;border-top:1px solid #1e1e1e}
  .uitleg-item{margin-bottom:8px}
  .uitleg-btn{width:100%;background:#141414;border:1px solid #1e1e1e;border-radius:2px;padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:inherit;transition:background .15s}
  .uitleg-btn:hover{background:#1a1a1a}
  .uitleg-btn-left{display:flex;gap:12px;align-items:baseline}
  .uitleg-btn-name{font-size:13px;color:#e8e6e0;font-weight:500}
  .uitleg-btn-reps{font-size:11px;color:#555}
  .uitleg-icon{font-size:16px;transition:transform .2s}
  .uitleg-body{background:#111;border:1px solid #1e1e1e;border-top:none;border-radius:0 0 2px 2px;padding:14px 16px}
  .uitleg-spier{font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
  .uitleg-text{font-size:12px;color:#bbb;line-height:1.75;margin-bottom:12px}
  .uitleg-tip{display:flex;gap:8px;align-items:flex-start;padding:10px 12px;background:#1a1a1a;border-radius:2px;border-left:2px solid}
  .uitleg-tip-label{font-size:10px;flex-shrink:0;margin-top:1px}
  .uitleg-tip-text{font-size:11px;color:#777;line-height:1.7}
  .prog-table{width:100%;border-collapse:collapse;font-size:11px}
  .prog-table td{padding:6px}
  .prog-table tr{border-top:1px solid #1a1a1a}
  .prog-table thead td{color:#383838;padding:4px 6px}
  .no-data{padding:12px;background:#141414;border-radius:2px;font-size:12px;color:#383838;margin-bottom:12px}
  .weight-status{margin-bottom:20px;padding:12px 14px;background:#141414;border-radius:2px;font-size:11px}
  .weight-input-row{display:flex;gap:8px;margin-bottom:28px}
  .weight-input{background:#1c1c1c;border:1px solid #2a2a2a;color:#e8e6e0;font-family:inherit;font-size:14px;padding:8px 14px;border-radius:2px;flex:1}
  .weight-history-label{font-size:11px;color:#383838;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
  .weight-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;font-size:13px}
  .weight-row-date{color:#555}
  .weight-row-val{color:#e8e6e0;font-weight:500}
  .webhook-section{margin-bottom:20px;padding:14px;background:#141414;border-radius:2px}
  .webhook-input-row{display:flex;gap:8px;margin-top:10px}
  .webhook-input{background:#1c1c1c;border:1px solid #2a2a2a;color:#e8e6e0;font-family:inherit;font-size:11px;padding:6px 10px;border-radius:2px;flex:1}
  .webhook-error{font-size:10px;color:#ff6b6b;margin-top:8px}
  .svg-chart{overflow:visible;width:100%}
  .trend-box{margin-bottom:24px;padding:16px;background:#141414;border-radius:2px}
  .trend-header{display:flex;justify-content:space-between;margin-bottom:12px;align-items:baseline}
  .trend-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.1em}
  .fullscreen-btn{background:none;border:1px solid #2a2a2a;color:#555;font-family:inherit;font-size:10px;letter-spacing:.08em;padding:4px 10px;border-radius:2px;cursor:pointer;white-space:nowrap}
  .loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:#444;letter-spacing:.12em;gap:8px}
  @media(max-width:400px){.si{width:50px;font-size:12px}}
</style>
</head>
<body>
<div id="app"><div class="loading"><div>LADEN...</div></div></div>
<script src="app.js"></script>
</body>
</html>
